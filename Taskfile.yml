version: '3'

dotenv: ['.env']

tasks:
  pyright:
    cmds:
     - uv run basedpyright
  check:
    cmds:
      - uv run ruff check inky-mbta-tracker
      - task: pyright
  fix:
    cmds:
      - uv run ruff check --fix inky-mbta-tracker
      - uv run ruff check --fix inky-mbta-tracker/compute_class_hashes.py
  format:
    cmds:
      - uv run ruff format inky-mbta-tracker
      - uv run ruff format inky-mbta-tracker/compute_class_hashes.py
  run:
    cmds:
      - uv run inky-mbta-tracker
  api-server:
    cmds:
      - uv run uvicorn api_server:app --workers 4 --loop uvloop
  gunicorn:
      cmds:
      - uv run gunicorn -w 4 -k uvicorn.workers.UvicornWorker api_server:app
  logs:
    cmds:
      - uvx tail -f imt.log
  profile:
    cmds:
      - uvx scalene inky-mbta-tracker/main.py
  compute-class-hashes:
    cmds:
      - uv run inky-mbta-tracker/compute_class_hashes.py
      - uv run ruff format inky-mbta-tracker/shared_types/class_hashes.py
  clear-logs:
    cmds:
      - rm *.log
  clear-redis:
    cmds:
      - podman compose exec tracker-redis redis-cli -a mbta FLUSHALL
  test:
    cmds:
      - uv run pytest
  load-test-sse:
    cmds:
      - uv run python inky-mbta-tracker/load_test_sse.py --url http://localhost:8000/vehicles/stream {{.CLI_ARGS}}
  check-all:
    cmds:
      - task: format
      - task: fix
      - task: check
      - task: test
